<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PanneauScan" />
  <title>PanneauScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
      --accent: #e8ff47; --text: #f0f0f5; --muted: #6b6b80;
      --success: #4eff91; --danger: #ff4e4e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100dvh;overflow-x:hidden;user-select:none; }
    header { position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:linear-gradient(to bottom,rgba(10,10,15,.95),transparent); }
    .logo { display:flex;align-items:center;gap:10px; }
    .logo-icon { width:36px;height:36px;background:var(--accent);border-radius:8px;display:grid;place-items:center; }
    .logo-icon svg { width:20px;height:20px; }
    .logo-text { font-size:18px;font-weight:800;letter-spacing:-.5px; }
    .logo-text span { color:var(--accent); }
    .status-pill { display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);transition:all .3s; }
    .status-pill.ready { color:var(--success);border-color:rgba(78,255,145,.3); }
    .status-pill.scanning { color:var(--accent);border-color:rgba(232,255,71,.3); }
    .dot { width:7px;height:7px;border-radius:50%;background:currentColor; }
    .dot.pulse { animation:pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)} }
    .camera-wrap { position:relative;width:100%;height:100dvh;overflow:hidden;background:#000; }
    #video { width:100%;height:100%;object-fit:cover;display:block; }
    #overlay { position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none; }
    .finder { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(70vw,300px);aspect-ratio:1;pointer-events:none; }
    .finder::before,.finder::after,.finder-inner::before,.finder-inner::after { content:'';position:absolute;width:22px;height:22px;border-color:var(--accent);border-style:solid;opacity:.7; }
    .finder::before { top:0;left:0;border-width:2px 0 0 2px;border-radius:4px 0 0 0; }
    .finder::after { top:0;right:0;border-width:2px 2px 0 0;border-radius:0 4px 0 0; }
    .finder-inner::before { bottom:0;left:0;border-width:0 0 2px 2px;border-radius:0 0 0 4px; }
    .finder-inner::after { bottom:0;right:0;border-width:0 2px 2px 0;border-radius:0 0 4px 0; }
    .scan-line { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(70vw,300px);height:2px;background:linear-gradient(to right,transparent,var(--accent),transparent);opacity:0;pointer-events:none; }
    .scan-line.active { opacity:1;animation:scanAnim 2s ease-in-out infinite; }
    @keyframes scanAnim { 0%{top:calc(50% - min(35vw,150px));opacity:0}10%{opacity:1}90%{opacity:1}100%{top:calc(50% + min(35vw,150px));opacity:0} }
    .bottom-panel { position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 16px 32px;background:linear-gradient(to top,rgba(10,10,15,.98) 60%,transparent); }
    #startBtn { display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px;background:var(--accent);color:#0a0a0f;border:none;border-radius:16px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s,opacity .15s; }
    #startBtn:active { transform:scale(.97);opacity:.9; }
    #startBtn.stop { background:var(--danger);color:#fff; }
    .detections { display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:220px;overflow-y:auto; }
    .det-card { display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;animation:slideUp .3s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
    .det-card.highlight { border-color:rgba(232,255,71,.4);background:rgba(232,255,71,.05); }
    .det-icon { width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex-shrink:0;background:rgba(255,255,255,.05); }
    .det-info { flex:1;min-width:0; }
    .det-label { font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .det-sub { font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px; }
    .det-score { font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);flex-shrink:0; }
    .empty-state { text-align:center;padding:20px;color:var(--muted);font-size:13px;display:none; }
    .empty-state.visible { display:block; }
    #loadingOverlay { position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:200;transition:opacity .5s; }
    #loadingOverlay.hidden { opacity:0;pointer-events:none; }
    .loader-ring { width:64px;height:64px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loader-text { font-size:14px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-align:center;padding:0 20px; }
    .info-badge { position:fixed;top:72px;left:50%;transform:translateX(-50%);background:rgba(232,255,71,.12);border:1px solid rgba(232,255,71,.3);color:var(--accent);font-size:11px;font-family:'JetBrains Mono',monospace;padding:6px 14px;border-radius:100px;white-space:nowrap;opacity:0;transition:opacity .4s;pointer-events:none;z-index:99; }
    .info-badge.show { opacity:1; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loadingText">Chargement du modèle IA...</div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="logo-text">Panneau<span>Scan</span></div>
  </div>
  <div class="status-pill" id="statusPill">
    <div class="dot"></div>
    <span id="statusText">Chargement…</span>
  </div>
</header>

<div class="info-badge" id="infoBadge"></div>

<div class="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div class="finder"><div class="finder-inner"></div></div>
  <div class="scan-line" id="scanLine"></div>
</div>

<div class="bottom-panel">
  <div class="detections" id="detections"></div>
  <div class="empty-state visible" id="emptyState">Aucune détection pour l'instant…<br>Lance le scan !</div>
  <button id="startBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    Lancer le scan
  </button>
</div>

<script>
const MODEL_URL = 'https://marama1958.github.io/panneauscan/best_web_model/model.json';
const CONF_THRESHOLD = 0.35;
const INPUT_SIZE = 640;

const CLASSES = [
  "crosswalk","give-way","giveway","go-straight","intersection",
  "keep-left","keep-right","no-entry","no-left-turn","no-overtaking",
  "no-parking","no-right-turn","no-stopping","no-u-turn","parking",
  "roundabout","speed-limit","stop","traffic-light","warning"
];

const CLASS_INFO = {
  "stop":          { emoji:"🛑", label:"STOP",                   desc:"Arrêt obligatoire" },
  "no-entry":      { emoji:"⛔", label:"Sens interdit",          desc:"Accès interdit" },
  "give-way":      { emoji:"⚠️", label:"Cédez le passage",      desc:"Priorité aux autres" },
  "giveway":       { emoji:"⚠️", label:"Cédez le passage",      desc:"Priorité aux autres" },
  "speed-limit":   { emoji:"🔵", label:"Limitation de vitesse",  desc:"Respecter la vitesse" },
  "no-parking":    { emoji:"🚫", label:"Stationnement interdit", desc:"Ne pas stationner" },
  "no-stopping":   { emoji:"🚫", label:"Arrêt interdit",         desc:"Ne pas s'arrêter" },
  "traffic-light": { emoji:"🚦", label:"Feu de circulation",     desc:"Respecter le feu" },
  "crosswalk":     { emoji:"🚶", label:"Passage piéton",         desc:"Priorité aux piétons" },
  "roundabout":    { emoji:"🔄", label:"Rond-point",             desc:"Céder le passage" },
  "no-left-turn":  { emoji:"⬅️", label:"Interdit gauche",       desc:"Ne pas tourner à gauche" },
  "no-right-turn": { emoji:"➡️", label:"Interdit droite",       desc:"Ne pas tourner à droite" },
  "no-u-turn":     { emoji:"↩️", label:"Demi-tour interdit",    desc:"Ne pas faire demi-tour" },
  "no-overtaking": { emoji:"🚗", label:"Dépassement interdit",   desc:"Ne pas dépasser" },
  "parking":       { emoji:"🅿️", label:"Stationnement autorisé",desc:"Zone de parking" },
  "go-straight":   { emoji:"⬆️", label:"Tout droit",            desc:"Suivre tout droit" },
  "keep-left":     { emoji:"◀️", label:"Serrez à gauche",       desc:"Garder la gauche" },
  "keep-right":    { emoji:"▶️", label:"Serrez à droite",       desc:"Garder la droite" },
  "intersection":  { emoji:"✚",  label:"Intersection",           desc:"Carrefour" },
  "warning":       { emoji:"⚠️", label:"Attention",              desc:"Danger à proximité" },
  "default":       { emoji:"📋", label:"Panneau détecté",         desc:"Analyse en cours" },
};

function getInfo(cls) { return CLASS_INFO[cls] || CLASS_INFO["default"]; }

let model = null, stream = null, scanning = false, animFrame = null, lastLabels = [];

const video      = document.getElementById('video');
const canvas     = document.getElementById('overlay');
const ctx        = canvas.getContext('2d');
const startBtn   = document.getElementById('startBtn');
const detDiv     = document.getElementById('detections');
const emptyState = document.getElementById('emptyState');
const statusPill = document.getElementById('statusPill');
const statusText = document.getElementById('statusText');
const scanLine   = document.getElementById('scanLine');
const loadingOvl = document.getElementById('loadingOverlay');
const loadingTxt = document.getElementById('loadingText');
const infoBadge  = document.getElementById('infoBadge');

function setStatus(text, type='') {
  statusText.textContent = text;
  statusPill.className = 'status-pill ' + type;
  statusPill.querySelector('.dot').className = 'dot' + (type==='scanning' ? ' pulse' : '');
}

let badgeTimer;
function showBadge(msg) {
  infoBadge.textContent = msg;
  infoBadge.classList.add('show');
  clearTimeout(badgeTimer);
  badgeTimer = setTimeout(() => infoBadge.classList.remove('show'), 2500);
}

async function loadModel() {
  try {
    model = await tf.loadGraphModel(MODEL_URL);
    loadingOvl.classList.add('hidden');
    setStatus('Prêt', 'ready');
    showBadge('Modèle PanneauScan chargé ✓');
  } catch(e) {
    console.error(e);
    loadingTxt.textContent = '❌ Erreur — vérifie que best_web_model/model.json est bien sur GitHub';
  }
}

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }, audio:false
  });
  video.srcObject = stream;
  await new Promise(r => video.addEventListener('loadedmetadata', r, {once:true}));
  resizeCanvas();
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; video.srcObject = null;
}

function resizeCanvas() {
  canvas.width  = video.videoWidth  || video.offsetWidth;
  canvas.height = video.videoHeight || video.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);

function preprocess(el) {
  return tf.tidy(() => {
    return tf.browser.fromPixels(el)
      .resizeBilinear([INPUT_SIZE, INPUT_SIZE])
      .div(255.0)
      .expandDims(0);
  });
}

function postprocess(output, imgW, imgH) {
  const data = output.dataSync();
  const shape = output.shape;
  let boxes = [];

  const transposed = shape[1] < shape[2]; // [1, features, boxes]
  const numBoxes   = transposed ? shape[2] : shape[1];
  const numFeats   = transposed ? shape[1] : shape[2];
  const numClasses = numFeats - 4;

  for (let i = 0; i < numBoxes; i++) {
    let cx, cy, w, h, maxScore = 0, classId = 0;
    if (transposed) {
      cx = data[0*numBoxes+i]; cy = data[1*numBoxes+i];
      w  = data[2*numBoxes+i]; h  = data[3*numBoxes+i];
      for (let c=0;c<numClasses;c++) {
        const s = data[(4+c)*numBoxes+i];
        if (s>maxScore){maxScore=s;classId=c;}
      }
    } else {
      const b = i*numFeats;
      cx=data[b];cy=data[b+1];w=data[b+2];h=data[b+3];
      for (let c=0;c<numClasses;c++) {
        const s=data[b+4+c];
        if(s>maxScore){maxScore=s;classId=c;}
      }
    }
    if (maxScore > CONF_THRESHOLD) {
      boxes.push({
        x:(cx-w/2)/INPUT_SIZE*imgW, y:(cy-h/2)/INPUT_SIZE*imgH,
        w:w/INPUT_SIZE*imgW, h:h/INPUT_SIZE*imgH,
        score:maxScore, classId
      });
    }
  }

  boxes.sort((a,b)=>b.score-a.score);
  const kept=[], seen=new Set();
  for (const box of boxes) {
    if (!seen.has(box.classId)) { seen.add(box.classId); kept.push(box); }
  }
  return kept.slice(0,6);
}

async function detect() {
  if (!scanning || !model) return;
  if (video.readyState < 2) { animFrame=requestAnimationFrame(detect); return; }

  resizeCanvas();
  const scaleX = canvas.width/video.videoWidth;
  const scaleY = canvas.height/video.videoHeight;

  const input = preprocess(video);
  let output;
  try { output = model.predict(input); } catch(e) { input.dispose(); animFrame=requestAnimationFrame(detect); return; }

  const dets = postprocess(Array.isArray(output)?output[0]:output, video.videoWidth, video.videoHeight);
  input.dispose();
  (Array.isArray(output)?output:[output]).forEach(t=>t.dispose());

  ctx.clearRect(0,0,canvas.width,canvas.height);
  dets.forEach(det => {
    const cls = CLASSES[det.classId]||'default';
    const info = getInfo(cls);
    const sx=det.x*scaleX, sy=det.y*scaleY, sw=det.w*scaleX, sh=det.h*scaleY;
    ctx.shadowColor='#e8ff47'; ctx.shadowBlur=12;
    ctx.strokeStyle='#e8ff47'; ctx.lineWidth=2;
    ctx.strokeRect(sx,sy,sw,sh);
    ctx.shadowBlur=0;
    const lbl=`${info.emoji} ${cls}`;
    ctx.font='bold 13px Syne,sans-serif';
    const tw=ctx.measureText(lbl).width;
    ctx.fillStyle='rgba(232,255,71,0.9)';
    ctx.fillRect(sx-1,sy-24,tw+14,22);
    ctx.fillStyle='#0a0a0f';
    ctx.fillText(lbl,sx+6,sy-7);
  });

  updateCards(dets);
  animFrame = requestAnimationFrame(detect);
}

function updateCards(dets) {
  const labels = dets.map(d=>d.classId+'_'+Math.round(d.score*100));
  if (JSON.stringify(labels)===JSON.stringify(lastLabels)) return;
  lastLabels = labels;
  detDiv.innerHTML='';
  emptyState.classList.toggle('visible', dets.length===0);
  dets.forEach((det,i) => {
    const cls=CLASSES[det.classId]||'default';
    const info=getInfo(cls);
    const card=document.createElement('div');
    card.className='det-card'+(i===0?' highlight':'');
    card.style.animationDelay=(i*40)+'ms';
    card.innerHTML=`
      <div class="det-icon">${info.emoji}</div>
      <div class="det-info">
        <div class="det-label">${info.label}</div>
        <div class="det-sub">${info.desc}</div>
      </div>
      <div class="det-score">${Math.round(det.score*100)}%</div>`;
    detDiv.appendChild(card);
  });
}

startBtn.addEventListener('click', async () => {
  if (!model) return;
  if (!scanning) {
    try {
      await startCamera(); scanning=true;
      scanLine.classList.add('active');
      startBtn.classList.add('stop');
      startBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg> Arrêter`;
      setStatus('Scan actif','scanning'); detect();
    } catch(e){console.error(e);}
  } else {
    scanning=false; cancelAnimationFrame(animFrame); stopCamera();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    scanLine.classList.remove('active');
    startBtn.classList.remove('stop');
    startBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg> Lancer le scan`;
    setStatus('Prêt','ready'); lastLabels=[]; detDiv.innerHTML='';
    emptyState.classList.add('visible');
  }
});

loadModel();
</script>
</body>
</html>
